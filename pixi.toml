[workspace]
name = "cuda-mppi"
version = "0.1.0"
description = "CUDA-accelerated MPPI control"
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[dependencies]
python = ">=3.12,<3.14"
numpy = "*"
matplotlib = ">=3.10"
pandas = ">=2.0"
pytest = "*"
pip = "*"
cmake = ">=3.18"
eigen = ">=3.4"
nanobind = ">=1.3.2"

[pypi-dependencies]
scienceplots = "*"
scikit-build-core = ">=0.3.3"
jax = { version = ">=0.9.2, <0.10", extras = ["cuda13"] }

[tasks]
install = "pip install --no-build-isolation -e ."
test = { cmd = "pytest tests/ -v", env = { PYTHONPATH = "" } }
tracking = { cmd = "python tests/test_quadrotor_tracking.py --plot", env = { PYTHONPATH = "" } }
bench-jax = { cmd = "python scripts/bench_jax_mppi.py", env = { PYTHONPATH = "" } }
